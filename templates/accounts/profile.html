{% extends 'base.html' %}
{% load static %}

{% block title %}Profile - JobPortal{% endblock %}

{% block content %}
<div class="container" style="padding: 40px 0; max-width: 600px;">
    <h1 style="margin-bottom: 30px;">My Profile</h1>
    
    <div class="card">
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="{{ user.get_full_name }}" disabled>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" value="{{ user.email }}" disabled>
            </div>
            
            <div class="form-group">
                <label>Bio</label>
                <textarea placeholder="Tell us about yourself..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
